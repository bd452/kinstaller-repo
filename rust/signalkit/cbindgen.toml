# cbindgen configuration for the SignalKit C ABI.
#
# Regenerate the header with:
#   cbindgen --crate signalkit --config cbindgen.toml --output include/signalkit.h
# (CI diff-checks the committed header against this.)

language = "C"
header = "/* Generated by cbindgen from the `signalkit` crate. Do not edit by hand. */"
include_guard = "SIGNALKIT_H"
tab_width = 4
documentation = true
documentation_style = "c"
cpp_compat = true
pragma_once = false

[defines]

[export]
prefix = ""
# Only the C ABI surface is exported; internal types stay out of the header.
include = [
    "sk_signal_i64",
    "sk_label",
    "sk_button",
    "sk_stack",
    "sk_app",
]

[parse]
parse_deps = false

[fn]
args = "vertical"

[enum]
prefix_with_name = true
