name: Rebuild legacy package sources

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bd452/kindle-kpm-build:v0.1.0@sha256:c7bd7e4041717bb16765b97d6fe4f578f40d144fa3628fcad81271e22f18a69b
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build legacy packages
        run: ./build.sh

      - name: Upload reviewable package tree
        uses: actions/upload-artifact@v4
        with:
          name: legacy-package-rebuild
          path: |
            manifest.json
            packages/**
