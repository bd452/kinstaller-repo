name: Deploy Repository

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Checkout pinned KPM devkit
        uses: actions/checkout@v4
        with:
          repository: bd452/kindle-kpm-devkit
          ref: v0.1.0
          path: .kpm-devkit

      - name: Add kpm-dev to PATH
        run: echo "$GITHUB_WORKSPACE/.kpm-devkit/bin" >> "$GITHUB_PATH"

      - name: Generate and validate KPM manifest
        run: |
          python3 scripts/verify-pinned-artifacts.py
          ./scripts/build-registry.sh
          git diff --exit-code -- manifest.json

      - name: Build repository index
        run: |
          pip install -r index_builder/requirements.txt
          python index_builder/build_index.py

      - name: Stage Pages site
        run: ./scripts/stage-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
