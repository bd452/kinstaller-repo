name: Deploy Repository

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
      - name: Install koxtoolchain
        run: ./scripts/setup-koxtoolchain.sh
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add armv7-unknown-linux-gnueabihf armv7-unknown-linux-gnueabi
      - name: Install libclang (for bindgen)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Rust host tests
        run: |
          cargo test --manifest-path rust/Cargo.toml -p signalkit
          cargo test --manifest-path rust/Cargo.toml -p signalkit --features capi
      - name: Build packages
        run: ./build.sh
      - name: Build repository index
        run: |
          pip install -r index_builder/requirements.txt
          python index_builder/build_index.py
      - name: Cleanup
        run: |
          rm -rf index_builder
          rm -rf .github
          rm -rf rust
          rm -f README.md
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
